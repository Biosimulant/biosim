name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - biosimulant
          - biosim

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build SimUI frontend
        run: bash scripts/build_simui_frontend.sh

      - name: Build biosimulant package distributions
        run: python -m build --outdir dist/biosimulant

      - name: Build legacy biosim package distributions
        run: python scripts/build_legacy_biosim_dist.py --outdir dist/biosim

      - name: Check package distributions
        run: twine check dist/biosimulant/* dist/biosim/*

      - name: Upload biosimulant distributions
        uses: actions/upload-artifact@v4
        with:
          name: biosimulant-dist
          path: dist/biosimulant/*

      - name: Upload legacy biosim distributions
        uses: actions/upload-artifact@v4
        with:
          name: biosim-dist
          path: dist/biosim/*

  publish-biosimulant:
    needs: build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.package == 'all' ||
      github.event.inputs.package == 'biosimulant'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download biosimulant distributions
        uses: actions/download-artifact@v4
        with:
          name: biosimulant-dist
          path: dist/biosimulant

      - name: Publish biosimulant to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/biosimulant
          skip-existing: true

  publish-biosim:
    needs: build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.package == 'all' ||
      github.event.inputs.package == 'biosim'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download legacy biosim distributions
        uses: actions/download-artifact@v4
        with:
          name: biosim-dist
          path: dist/biosim

      - name: Publish legacy biosim to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/biosim
          skip-existing: true
